<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH2 IT Center - MCQ Exam</title>

  <link rel="stylesheet" herf="style.css">
  
</head>
<body oncontextmenu="return false">

<header>
  <div class="flip-container" id="flipLogo">
    <div class="flip-container-inner">
      <img src="https://i.pinimg.com/736x/df/1d/9a/df1d9a56ddb5b483abcf894814c8486b.jpg" class="front" alt="logo">
      <img src="https://i.pinimg.com/736x/ce/58/c1/ce58c1d1278349c500426a7ef0f6908f.jpg" class="back" alt="logo">
    </div>
  </div>
  <span>MH2 IT Center</span>
</header>

<div id="examTimer">Time Left: 30:00</div>

<div id="lock" class="lock fadeIn">
  <h2>Office Software Competency Exam <br>Start Password</h2>
  <input type="password" id="startPass" placeholder="Enter Password">
  <br>
  <button onclick="startExam()">Start Exam</button>
</div>

<div id="countdown" class="lock" style="display:none">
  <h2>Exam starting in....</h2>
  <p id="count">5</p>
</div>

<div class="container" id="exam" style="display:none"></div>

<div style="text-align:center; display:none" id="submitDiv">
  <button onclick="submitExam()">Submit Exam</button>
</div>

<div id="result"></div>

<div style="text-align:center; display:none" id="restartDiv">
  <button onclick="restartExam()">home back</button>
</div>

              
  
  <script src="funtion.js> </script>

    
</body>
</html>
