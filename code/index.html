<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH2 IT Center - MCQ Exam</title>
<style>
/* ================= Global ================= */
body{
  font-family: 'Arial', sans-serif;
  margin:0;
  padding:0;
  background: linear-gradient(135deg,#00051b,#00051b);
  color:#00f6ff;
  overflow-x:hidden;
}

header{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:flex-start; /* logo left, text right */
  padding:10px 20px;
  background:#000000;
  font-size:28px;
  font-weight:bold;
  color:#00f6ff;
  z-index:1000;
  box-shadow: 0 2px 10px #00f6ff;
  gap:20px;
}

/* ================= Logo Flip ================= */
.flip-container {
  perspective: 1000px;
  width:120px;
  height:120px;
  cursor:pointer;
}

.flip-container-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.8s;
  transform-style: preserve-3d;
}

.flip-container.flipped .flip-container-inner {
  transform: rotateY(180deg);
}

.flip-container img {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid #00f6ff;
  box-shadow: 0 0 15px #00f6ff;
  backface-visibility: hidden;
}

.flip-container img.back {
  transform: rotateY(180deg);
}

/* ================= Timer Fixed ================= */
#examTimer{
  position: fixed;
  top:140px; /* header height + spacing */
  left:50%;
  transform: translateX(-50%);
  font-size:28px;
  color:#09ff00;
  text-shadow: 0 0 10px rgb(179, 255, 0), 0 0 20px rgb(0, 255, 255), 0 0 30px rgb(0, 225, 255);
  z-index:999;
  font-weight:bold;
  display:none;
}

/* ================= Lock & Countdown ================= */
.lock, #countdown{
  text-align:center;
  margin-top:180px;
  animation: fadeIn 1s ease-in-out;
}

.lock input[type=password]{
  padding:14px;
  border-radius:6px;
  border:none;
  width:260px;
  font-size:18px;
  color:#000;
}

button{
  background:#00f6ff;
  color:#000;
  border:none;
  padding:12px 25px;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  margin:15px;
  transition: 0.3s;
}
button:hover{
  background:#00b8ff;
}

#countdown h2{
  font-size:28px;
  margin-bottom:10px;
}

#countdown p{
  font-size:50px;
  color:#00f6ff;
  margin:0;
}

/* ================= Exam Questions ================= */
.container{
  max-width:900px;
  margin:250px auto 50px auto; /* margin-top to avoid header & timer overlap */
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.question{
  background:#0a0a0a;
  padding:25px;
  margin-bottom:20px;
  border-radius:15px;
  width:100%;
  max-width:800px;
  animation: fadeInUp 0.8s ease forwards;
  opacity:0;
  font-size:22px;
}

.options{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
}

.options label{
  display:flex;
  align-items:center;
  gap:15px;
  cursor:pointer;
  font-size:20px;
  background:#000000;
  padding:10px 15px;
  border-radius:10px;
  transition: 0.3s;
}

.options input[type=radio]{
  width:24px;
  height:24px;
  accent-color:#00f6ff;
}

/* ================= Result ================= */
.result{
  background: linear-gradient(145deg,#000000,#000000);
  padding:30px;
  border-radius:20px;
  text-align:center;
  margin:40px auto;
  font-size:22px;
  color:#00f6ff;
  max-width:600px;
  box-shadow: 0 0 30px #00f6ff, 0 0 60px #00b8ff inset;
  animation: fadeIn 1s ease forwards;
}

.result h2{
  font-size:32px;
  margin-bottom:20px;
  text-shadow: 0 0 15px #00f6ff, 0 0 30px #00b8ff;
}

.result p{
  font-size:22px;
  margin:10px 0;
  padding:10px;
  border-radius:12px;
  border:1px solid #00f6ff;
  background:rgba(0,246,255,0.1);
  box-shadow: 0 0 10px #00b8ff inset;
}

#restartDiv button{
  font-size:20px;
  padding:12px 25px;
  background:#00ffb3;
  color:#000;
  border-radius:10px;
  box-shadow: 0 0 15px #00ffb3;
}
#restartDiv button:hover{
  background:#00e699;
}

/* ================= Animations ================= */
@keyframes fadeInUp{
  0%{opacity:0; transform: translateY(20px);}
  100%{opacity:1; transform: translateY(0);}
}

@keyframes fadeIn{
  0%{opacity:0;}
  100%{opacity:1;}
}
</style>
</head>
<body oncontextmenu="return false">

<header>
  <div class="flip-container" id="flipLogo">
    <div class="flip-container-inner">
      <img src="https://i.pinimg.com/736x/df/1d/9a/df1d9a56ddb5b483abcf894814c8486b.jpg" class="front" alt="logo">
      <img src="https://i.pinimg.com/736x/ce/58/c1/ce58c1d1278349c500426a7ef0f6908f.jpg" class="back" alt="logo">
    </div>
  </div>
  <span>MH2 IT Center</span>
</header>

<div id="examTimer">Time Left: 30:00</div>

<div id="lock" class="lock fadeIn">
  <h2>Office Software Competency Exam <br>Start Password</h2>
  <input type="password" id="startPass" placeholder="Enter Password">
  <br>
  <button onclick="startExam()">Start Exam</button>
</div>

<div id="countdown" class="lock" style="display:none">
  <h2>Exam starting in....</h2>
  <p id="count">5</p>
</div>

<div class="container" id="exam" style="display:none"></div>

<div style="text-align:center; display:none" id="submitDiv">
  <button onclick="submitExam()">Submit Exam</button>
</div>

<div id="result"></div>

<div style="text-align:center; display:none" id="restartDiv">
  <button onclick="restartExam()">home back</button>
</div>

              
  
  <script src="funtion.js> </script>

    
</body>
</html>
